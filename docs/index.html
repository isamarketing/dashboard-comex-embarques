<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVALCE · Tracking de Embarques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F1A;--surface:#141929;--surface2:#1C2236;--border:#2A3050;--text:#E8ECF4;--text-dim:#8892A8;--accent:#4F8CFF;--accent2:#00D4AA;--accent3:#FF6B6B;--accent4:#FFB84D;--vivalce:#00D4AA}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0B0F1A,#141929)}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.header h1 span{color:var(--vivalce)}
.header .subtitle{color:var(--text-dim);font-size:12px;margin-top:2px}
.header .badge{background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:11px;color:var(--accent);font-family:"Space Mono",monospace}
.tabs{display:flex;gap:0;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--vivalce);border-bottom-color:var(--vivalce)}
.dashboard{padding:20px 28px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px}
.kpi .value{font-family:"Space Mono",monospace;font-size:22px;font-weight:700}
.kpi .sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.card h3{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card h3 .dot{width:7px;height:7px;border-radius:50%}
.oc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.oc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.oc-header .oc-code{font-family:"Space Mono",monospace;font-size:16px;font-weight:700}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tag-cumplida{background:rgba(0,212,170,.15);color:var(--accent2)}
.tag-transito{background:rgba(79,140,255,.15);color:var(--accent)}
.tag-preparacion{background:rgba(255,184,77,.15);color:var(--accent4)}
.tag-alerta{background:rgba(255,107,107,.15);color:var(--accent3)}
.milestones{display:flex;align-items:center;gap:0;margin:12px 0;position:relative}
.milestone{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:1}
.milestone .dot-m{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--surface2)}
.milestone .dot-m.done{background:var(--accent2);border-color:var(--accent2)}
.milestone .dot-m.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(79,140,255,.4)}
.milestone .lbl{font-size:9px;color:var(--text-dim);margin-top:4px;text-align:center}
.milestone .dt{font-size:8px;color:var(--text-dim);font-family:"Space Mono",monospace}
.ms-line{position:absolute;top:7px;left:0;right:0;height:2px;background:var(--border);z-index:0}
.prod-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.prod-table th{text-align:left;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:500}
.prod-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.prod-table .num{text-align:right;font-family:"Space Mono",monospace;font-size:11px}
.alert-card{border-left:3px solid var(--accent3);padding-left:14px}
.alert-card.warn{border-left-color:var(--accent4)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.footer{padding:12px 28px;text-align:center;color:var(--text-dim);font-size:10px;border-top:1px solid var(--border)}
.hidden{display:none}
</style>
</head>
<body>
<div class="header">
<div><h1><span>VIVALCE</span> &mdash; Tracking de Embarques</h1><div class="subtitle">Comercio Exterior &middot; Actualizado 8 Abril 2026</div></div>
<div class="badge">2025 &mdash; 2026</div>
</div>
<div class="tabs" id="tabs"></div>

var currentTab = "status";

function fmt(n) { return n.toLocaleString("es-AR", {maximumFractionDigits: 0}); }
function fmtUSD(n) { return "USD " + fmt(n); }

function initTabs() {
  var tabs = document.getElementById("tabs");
  var names = [
    {id: "status", label: "Status Embarques"},
    {id: "alertas", label: "Alertas"},
    {id: "historial", label: "Historial"}
  ];
  names.forEach(function(t) {
    var div = document.createElement("div");
    div.className = "tab" + (t.id === currentTab ? " active" : "");
    div.textContent = t.label;
    div.setAttribute("data-tab", t.id);
    div.addEventListener("click", function() {
      currentTab = t.id;
      document.querySelectorAll(".tab").forEach(function(x) { x.classList.remove("active"); });
      div.classList.add("active");
      render();
    });
    tabs.appendChild(div);
  });
}

function getStatusTag(s) {
  if (s === "Cumplida") return '<span class="tag tag-cumplida">Cumplida</span>';
  if (s === "En Tr\u00e1nsito") return '<span class="tag tag-transito">En Tr\u00e1nsito</span>';
  if (s === "En Preparaci\u00f3n") return '<span class="tag tag-preparacion">En Preparaci\u00f3n</span>';
  return '<span class="tag tag-alerta">' + s + '</span>';
}

function getMilestones(e) {
  var steps = ["OC", "Factura", "ETD", "En Tr\u00e1nsito", "ETA", "Planta"];
  var done = 0;
  if (e.oc) done = 1;
  if (e.num_fact && e.num_fact !== "" && e.num_fact !== "None") done = 2;
  if (e.etd && e.etd !== "" && e.etd !== "None") done = 3;
  if (e.bl && e.bl !== "" && e.bl !== "None") done = 4;
  if (e.status === "Cumplida") done = 6;

  var h = '<div class="milestones"><div class="ms-line"></div>';
  for (var i = 0; i < steps.length; i++) {
    var cls = "dot-m";
    if (i < done) cls += " done";
    else if (i === done) cls += " current";
    h += '<div class="milestone"><div class="' + cls + '"></div><div class="lbl">' + steps[i] + '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderProducts(prods) {
  var h = '<table class="prod-table"><thead><tr><th>Producto</th><th class="num">Req (kg)</th><th class="num">Emb (kg)</th><th class="num">Precio</th><th class="num">Monto USD</th></tr></thead><tbody>';
  prods.forEach(function(p) {
    h += '<tr><td>' + p.producto + '</td>';
    h += '<td class="num">' + fmt(p.cant_req) + '</td>';
    h += '<td class="num">' + (p.cant_emb > 0 ? fmt(p.cant_emb) : '-') + '</td>';
    h += '<td class="num">' + p.precio.toFixed(2) + '</td>';
    h += '<td class="num">' + fmtUSD(p.monto) + '</td></tr>';
  });
  h += '</tbody></table>';
  return h;
}

function renderStatus(c) {
  var active = EMBARQUES.filter(function(e) { return e.year === 2026; });
  var enTransito = active.filter(function(e) { return e.status === "En Tr\u00e1nsito"; }).length;
  var enPrep = active.filter(function(e) { return e.status === "En Preparaci\u00f3n"; }).length;
  var cumplidas = active.filter(function(e) { return e.status === "Cumplida"; }).length;
  var totalKg = 0; var totalUSD = 0;
  active.forEach(function(e) {
    e.productos.forEach(function(p) { totalKg += p.cant_req; totalUSD += p.monto; });
  });

  var h = '<div class="kpi-row">';
  h += '<div class="kpi"><div class="label">OCs Activas 2026</div><div class="value">' + active.length + '</div></div>';
  h += '<div class="kpi"><div class="label">En Tr\u00e1nsito</div><div class="value">' + enTransito + '</div></div>';
  h += '<div class="kpi"><div class="label">En Preparaci\u00f3n</div><div class="value">' + enPrep + '</div></div>';
  h += '<div class="kpi"><div class="label">Cumplidas</div><div class="value">' + cumplidas + '</div></div>';
  h += '<div class="kpi"><div class="label">Volumen Total</div><div class="value">' + fmt(totalKg) + ' kg</div></div>';
  h += '<div class="kpi"><div class="label">Valor Total</div><div class="value">' + fmtUSD(totalUSD) + '</div></div>';
  h += '</div>';

  // OC cards - active first (transito + prep), then cumplidas
  var order = ["En Preparaci\u00f3n", "En Tr\u00e1nsito", "Cumplida"];
  order.forEach(function(st) {
    var filtered = active.filter(function(e) { return e.status === st; });
    if (filtered.length === 0) return;
    h += '<div class="card"><h3><span class="dot" style="background:' + (st === "Cumplida" ? "var(--accent2)" : st === "En Tr\u00e1nsito" ? "var(--accent)" : "var(--accent4)") + '"></span>' + st + ' (' + filtered.length + ')</h3>';
    filtered.forEach(function(e) {
      var eKg = 0; var eUSD = 0;
      e.productos.forEach(function(p) { eKg += p.cant_req; eUSD += p.monto; });
      h += '<div class="oc-card">';
      h += '<div class="oc-header"><div class="oc-code">' + e.oc + '</div>' + getStatusTag(e.status) + '</div>';
      h += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-dim);margin-bottom:8px">';
      h += '<span><strong>Proveedor:</strong> ' + e.emisor + '</span>';
      h += '<span><strong>Kg:</strong> ' + fmt(eKg) + '</span>';
      h += '<span><strong>USD:</strong> ' + fmtUSD(eUSD) + '</span>';
      if (e.eta_last) h += '<span><strong>ETA:</strong> ' + e.eta_last + '</span>';
      if (e.num_fact && e.num_fact !== "None" && e.num_fact !== "") h += '<span><strong>Factura:</strong> ' + e.num_fact + '</span>';
      h += '</div>';
      h += getMilestones(e);
      h += renderProducts(e.productos);
      h += '</div>';
    });
    h += '</div>';
  });

  c.innerHTML = h;
}

function renderAlertas(c) {
  var alerts = [];
  EMBARQUES.forEach(function(e) {
    if (e.etas && e.etas.length > 1) {
      alerts.push({
        oc: e.oc,
        emisor: e.emisor,
        eta_orig: e.etas[0],
        eta_last: e.etas[e.etas.length - 1],
        cambios: e.etas.length - 1,
        status: e.status
      });
    }
  });

  var h = '<div class="kpi-row">';
  h += '<div class="kpi"><div class="label">Alertas Activas</div><div class="value">' + alerts.length + '</div></div>';
  h += '</div>';

  if (alerts.length === 0) {
    h += '<div class="card"><p style="color:var(--text-dim);text-align:center;padding:20px">No hay alertas de cambio de ETA</p></div>';
  } else {
    alerts.forEach(function(a) {
      var severity = a.cambios > 2 ? "alert-card" : "alert-card warn";
      h += '<div class="card ' + severity + '">';
      h += '<h3>' + a.oc + ' &mdash; ' + a.emisor + ' ' + getStatusTag(a.status) + '</h3>';
      h += '<div style="font-size:12px;display:flex;gap:16px;flex-wrap:wrap">';
      h += '<span><strong>ETA Original:</strong> ' + a.eta_orig + '</span>';
      h += '<span><strong>ETA Actual:</strong> ' + a.eta_last + '</span>';
      h += '<span><strong>Cambios:</strong> ' + a.cambios + '</span>';
      h += '</div></div>';
    });
  }

  h += '<div class="card" style="margin-top:20px"><h3>Destinatarios de Notificaciones</h3>';
  h += '<div style="font-size:12px;color:var(--text-dim)">';
  h += '<p>cecilia@recsa-pu.com.ar</p>';
  h += '<p>viviana@vivalce.com.ar</p>';
  h += '<p>gabypoblet@isanmarketing.com</p>';
  h += '</div></div>';

  c.innerHTML = h;
}

function renderHistorial(c) {
  var h = '<div class="card"><h3><span class="dot" style="background:var(--accent2)"></span>Todos los Embarques</h3>';
  h += '<table class="prod-table"><thead><tr><th>OC</th><th>Proveedor</th><th>A\u00f1o</th><th class="num">Kg</th><th class="num">USD</th><th>Status</th><th>ETA</th></tr></thead><tbody>';
  
  EMBARQUES.forEach(function(e) {
    var eKg = 0; var eUSD = 0;
    e.productos.forEach(function(p) { eKg += p.cant_req; eUSD += p.monto; });
    h += '<tr>';
    h += '<td style="font-family:Space Mono,monospace;font-weight:600">' + e.oc + '</td>';
    h += '<td>' + e.emisor + '</td>';
    h += '<td>' + e.year + '</td>';
    h += '<td class="num">' + fmt(eKg) + '</td>';
    h += '<td class="num">' + fmtUSD(eUSD) + '</td>';
    h += '<td>' + getStatusTag(e.status) + '</td>';
    h += '<td style="font-size:11px">' + (e.eta_last || '-') + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';

  c.innerHTML = h;
}

function render() {
  var c = document.getElementById("dashboard");
  if (currentTab === "status") renderStatus(c);
  else if (currentTab === "alertas") renderAlertas(c);
  else renderHistorial(c);
}

initTabs();
render();
</script>
</body>
</html>
