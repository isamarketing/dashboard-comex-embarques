<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVALCE — Dashboard COMEX Embarques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:700}.header h1 span{color:var(--ac)}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{padding:24px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center}
.kpi .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:"JetBrains Mono";font-size:20px;font-weight:600;margin-top:4px}
.kpi .delta{font-size:11px;margin-top:3px;color:var(--t2)}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--s1);color:var(--t2);padding:8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:"JetBrains Mono";font-size:11px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600}
.tag-transit{background:rgba(79,140,255,.15);color:var(--ac)}
.tag-done{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-alert{background:rgba(255,184,77,.15);color:var(--or)}
.tag-critical{background:rgba(255,77,106,.15);color:var(--rd)}
.milestone{display:flex;align-items:center;gap:0;margin:4px 0}
.ms-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.ms-done{background:var(--gn);color:#000}
.ms-current{background:var(--ac);color:#fff;box-shadow:0 0 8px rgba(79,140,255,.5)}
.ms-pending{background:var(--bd);color:var(--t2)}
.ms-line{width:20px;height:2px;flex-shrink:0}
.ms-line-done{background:var(--gn)}
.ms-line-pending{background:var(--bd);border-top:1px dashed var(--t2)}
.bar-lt{height:12px;border-radius:3px;display:flex;overflow:hidden}
.bar-fab{background:var(--ac);opacity:.8}
.bar-trans{background:var(--gn);opacity:.8}
.bar-desp{background:var(--or);opacity:.8}
.hidden{display:none}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}.sr .lb{color:var(--t2)}.sr .vl{font-family:"JetBrains Mono";font-weight:600}
.btn-sm{padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:"DM Sans";font-size:12px;cursor:pointer}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
</style>
</head>

function fmt(n){return Math.abs(n).toLocaleString("es-AR",{maximumFractionDigits:0})}
function fmtD(n){return n.toFixed(2)}

var currentTab = "status";
var tabNames = [
  {id:"status",label:"Status Embarques"},
  {id:"alertas",label:"Alertas"},
  {id:"performance",label:"Performance"},
  {id:"historial",label:"Historial"}
];

function renderTabs(){
  var h = "";
  for(var i=0;i<tabNames.length;i++){
    var t = tabNames[i];
    var ac = currentTab===t.id?" active":"";
    h += "<div class=\"tab"+ac+"\" data-tab=\""+t.id+"\">"+t.label+"</div>";
  }
  document.getElementById("tabs").innerHTML = h;
  var tabEls = document.getElementById("tabs").getElementsByClassName("tab");
  for(var j=0;j<tabEls.length;j++){
    tabEls[j].addEventListener("click", function(){switchTab(this.getAttribute("data-tab"))});
  }
}

function switchTab(id){currentTab=id;renderTabs();renderContent();}
function renderContent(){
  if(currentTab==="status") renderStatus();
  else if(currentTab==="alertas") renderAlertas();
  else if(currentTab==="performance") renderPerformance();
  else if(currentTab==="historial") renderHistorial();
}

function getStatus(oc){
  for(var i=0;i<D.snapshots.length;i++){
    if(D.snapshots[i].oc===oc) return D.snapshots[i].status;
  }
  return "Desconocido";
}

function getDesvio(oc){
  for(var i=0;i<D.snapshots.length;i++){
    if(D.snapshots[i].oc===oc) return D.snapshots[i].desvio;
  }
  return 0;
}

function statusTag(st){
  if(st.indexOf("Cumplida")>=0) return '<span class="tag tag-done">Cumplida</span>';
  if(st.indexOf("nsito")>=0) return '<span class="tag tag-transit">En Transito</span>';
  return '<span class="tag tag-alert">'+st+'</span>';
}

function milestones(oc){
  var st = getStatus(oc);
  var done = st.indexOf("Cumplida")>=0;
  var transit = st.indexOf("nsito")>=0;
  var steps = ["OC","Fact","Emb","Trans","Arrib","Desp","Planta"];
  var activeIdx = done ? 7 : (transit ? 3 : 1);
  var h = '<div class="milestone">';
  for(var i=0;i<steps.length;i++){
    var cls = i<activeIdx?"ms-done":(i===activeIdx?"ms-current":"ms-pending");
    h += '<div class="ms-dot '+cls+'" title="'+steps[i]+'"></div>';
    if(i<steps.length-1){
      var lcls = i<activeIdx?"ms-line-done":"ms-line-pending";
      h += '<div class="ms-line '+lcls+'"></div>';
    }
  }
  h += '</div>';
  return h;
}

  var embs = D.embarques_2026;
  var totalUSD = 0;
  var inTransit = 0;
  var completed = 0;
  var alerts = 0;
  
  for(var i=0;i<embs.length;i++){
    var total = 0;
    for(var j=0;j<embs[i].productos.length;j++) total += embs[i].productos[j].monto;
    totalUSD += total;
    var st = getStatus(embs[i].oc);
    if(st.indexOf("nsito")>=0) inTransit++;
    if(st.indexOf("Cumplida")>=0) completed++;
    if(getDesvio(embs[i].oc) > 0) alerts++;
  }
  
  var h = '<div class="kpis">';
  h += '<div class="kpi"><div class="lb">Embarques 2026</div><div class="vl">'+embs.length+'</div><div class="delta">'+inTransit+' en transito / '+completed+' cumplidas</div></div>';
  h += '<div class="kpi"><div class="lb">Monto Total USD</div><div class="vl" style="color:var(--ac)">USD '+fmt(totalUSD)+'</div><div class="delta">5 OCs con facturas</div></div>';
  h += '<div class="kpi"><div class="lb">En Transito</div><div class="vl" style="color:var(--or)">'+inTransit+'</div><div class="delta">Embarques en curso</div></div>';
  h += '<div class="kpi"><div class="lb">Alertas ETA</div><div class="vl" style="color:var(--rd)">'+alerts+'</div><div class="delta">Cambios de fecha detectados</div></div>';
  h += '<div class="kpi"><div class="lb">On-Time Rate</div><div class="vl" style="color:'+(completed>inTransit?'var(--gn)':'var(--or)')+'">50%</div><div class="delta">3 de 6 on-time</div></div>';
  h += '</div>';
  
  // Milestones map
  h += '<div class="card"><h3>Mapa de Milestones</h3>';
  h += '<table><thead><tr><th>O.C.</th><th>Proveedor</th><th>Progreso</th><th>ETD</th><th>ETA</th><th>Monto USD</th><th>Status</th><th>Alerta</th></tr></thead><tbody>';
  for(var i=0;i<embs.length;i++){
    var e = embs[i];
    var total = 0;
    for(var j=0;j<e.productos.length;j++) total += e.productos[j].monto;
    var st = getStatus(e.oc);
    var desv = getDesvio(e.oc);
    var alertTag = desv > 10 ? '<span class="tag tag-critical">+'+desv+'d</span>' : (desv > 0 ? '<span class="tag tag-alert">+'+desv+'d</span>' : '<span style="color:var(--gn)">OK</span>');
    h += '<tr><td class="mono" style="font-weight:600">'+e.oc+'</td><td>'+e.emisor+'</td><td>'+milestones(e.oc)+'</td><td class="mono">'+e.etd.substring(0,10)+'</td><td class="mono">'+e.eta.substring(0,10)+'</td><td class="mono" style="text-align:right">'+fmt(total)+'</td><td>'+statusTag(st)+'</td><td>'+alertTag+'</td></tr>';
  }
  h += '</tbody></table></div>';
  
  // Detail per embarque
  h += '<div class="card"><h3>Detalle por Embarque — Productos</h3>';
  for(var i=0;i<embs.length;i++){
    var e = embs[i];
    var total = 0;
    for(var j=0;j<e.productos.length;j++) total += e.productos[j].monto;
    h += '<div style="margin-bottom:16px;padding:12px;background:var(--s1);border-radius:8px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div><span class="mono" style="font-weight:700;font-size:14px">'+e.oc+'</span> <span style="color:var(--t2)">'+e.emisor+'</span> '+statusTag(getStatus(e.oc))+'</div>';
    h += '<div class="mono" style="color:var(--ac)">USD '+fmt(total)+' | Term: '+e.term+'</div></div>';
    h += '<table><thead><tr><th>Producto</th><th style="text-align:right">Cant. Req.</th><th style="text-align:right">Cant. Emb.</th><th style="text-align:right">Precio USD</th><th style="text-align:right">Monto USD</th><th>Cumpl.</th></tr></thead><tbody>';
    for(var j=0;j<e.productos.length;j++){
      var p = e.productos[j];
      var cumpl = p.cant_req > 0 ? (p.cant_emb / p.cant_req * 100).toFixed(0) : "—";
      var cColor = cumpl === "100" ? "var(--gn)" : (parseFloat(cumpl) > 95 ? "var(--or)" : "var(--rd)");
      h += '<tr><td style="font-weight:500">'+p.producto+'</td><td class="mono" style="text-align:right">'+fmt(p.cant_req)+'</td><td class="mono" style="text-align:right">'+fmt(p.cant_emb)+'</td><td class="mono" style="text-align:right">'+fmtD(p.precio)+'</td><td class="mono" style="text-align:right">'+fmt(p.monto)+'</td><td class="mono" style="color:'+cColor+'">'+cumpl+'%</td></tr>';
    }
    h += '</tbody></table></div>';
  }
  h += '</div>';
  document.getElementById("content").innerHTML = h;
}

function renderAlertas(){
  var h = '<div class="card"><h3>Alertas de Cambio de ETA</h3>';
  h += '<p style="color:var(--t2);font-size:12px;margin-bottom:12px">Embarques con cambios de fecha detectados via snapshot</p>';
  h += '<table><thead><tr><th>O.C.</th><th>Proveedor</th><th>ETAs Registradas</th><th>ETA Original</th><th>ETA Ultima</th><th>Desvio</th><th>Status</th></tr></thead><tbody>';
  
  var sorted = D.snapshots.slice().sort(function(a,b){return b.desvio - a.desvio});
  for(var i=0;i<sorted.length;i++){
    var s = sorted[i];
    var dColor = s.desvio > 10 ? "var(--rd)" : (s.desvio > 0 ? "var(--or)" : "var(--gn)");
    var dTag = s.desvio > 10 ? '<span class="tag tag-critical">CRITICO +'+s.desvio+'d</span>' : (s.desvio > 0 ? '<span class="tag tag-alert">+'+s.desvio+'d</span>' : '<span style="color:var(--gn)">Sin desvio</span>');
    var etas = s.etas.replace(/\n/g, " → ");
    h += '<tr><td class="mono" style="font-weight:600">'+s.oc+'</td><td>'+s.proveedor+'</td><td class="mono" style="font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis">'+etas+'</td><td class="mono">'+s.eta_orig.substring(0,10)+'</td><td class="mono">'+s.eta_last.substring(0,10)+'</td><td>'+dTag+'</td><td>'+statusTag(s.status)+'</td></tr>';
  }
  h += '</tbody></table></div>';
  
  // Notification config
  h += '<div class="card"><h3>Configuracion de Notificaciones</h3>';
  h += '<p style="color:var(--t2);font-size:12px;margin-bottom:12px">Cuando se detecta un cambio de ETA o status, se envia email a:</p>';
  for(var i=0;i<D.alert_emails.length;i++){
    h += '<div class="sr"><span class="lb">'+D.alert_emails[i]+'</span><span class="vl" style="color:var(--gn)">Activo</span></div>';
  }
  h += '<div style="margin-top:12px;padding:8px;background:rgba(79,140,255,.1);border-radius:6px;font-size:11px;color:var(--ac)">Las notificaciones se envian automaticamente al actualizar la planilla via el Skill de Claude</div>';
  h += '</div>';
  
  document.getElementById("content").innerHTML = h;
}

function renderPerformance(){
  var perf = D.performance;
  var h = '<div class="kpis" style="grid-template-columns:repeat(4,1fr)">';
  
  // Calculate averages
  var totalLT=0,bestLT=999,worstLT=0,onTime=0;
  for(var i=0;i<perf.length;i++){
    totalLT+=perf[i].lt_total;
    if(perf[i].lt_total<bestLT) bestLT=perf[i].lt_total;
    if(perf[i].lt_total>worstLT) worstLT=perf[i].lt_total;
    if(perf[i].desvio<=0) onTime++;
  }
  var avgLT = perf.length>0?Math.round(totalLT/perf.length):0;
  
  h += '<div class="kpi"><div class="lb">LT Promedio</div><div class="vl" style="color:'+(avgLT<=70?'var(--gn)':'var(--or)')+'">'+avgLT+' dias</div><div class="delta">Objetivo: 70 dias</div></div>';
  h += '<div class="kpi"><div class="lb">Mejor LT</div><div class="vl" style="color:var(--gn)">'+bestLT+' dias</div></div>';
  h += '<div class="kpi"><div class="lb">Peor LT</div><div class="vl" style="color:var(--rd)">'+worstLT+' dias</div></div>';
  h += '<div class="kpi"><div class="lb">On-Time Rate</div><div class="vl" style="color:'+(onTime/perf.length>=0.7?'var(--gn)':'var(--or)')+'">'+Math.round(onTime/perf.length*100)+'%</div><div class="delta">'+onTime+' de '+perf.length+' on-time</div></div>';
  h += '</div>';
  
  // Detail table
  h += '<div class="card"><h3>Descomposicion del Lead Time por Embarque</h3>';
  h += '<table><thead><tr><th>O.C.</th><th>Proveedor</th><th>Origen</th><th style="text-align:right">Fabricacion</th><th style="text-align:right">Transito</th><th style="text-align:right">Despacho</th><th style="text-align:right">LT Total</th><th>Objetivo</th><th>Desvio</th><th>Status</th><th>Barra</th></tr></thead><tbody>';
  
  for(var i=0;i<perf.length;i++){
    var p = perf[i];
    var maxBar = 120;
    var scale = maxBar / (worstLT > 0 ? worstLT : 1);
    var fabW = Math.round(p.fabricacion * scale);
    var transW = Math.round(p.transito * scale);
    var despW = Math.round(p.despacho * scale);
    var stColor = p.desvio <= 0 ? "var(--gn)" : (p.desvio <= 10 ? "var(--or)" : "var(--rd)");
    var stTag = p.desvio <= 0 ? '<span class="tag tag-done">On-Time</span>' : (p.desvio <= 10 ? '<span class="tag tag-alert">+'+p.desvio+'d</span>' : '<span class="tag tag-critical">+'+p.desvio+'d</span>');
    
    h += '<tr><td class="mono" style="font-weight:600">'+p.oc+'</td><td>'+p.proveedor+'</td><td style="font-size:10px;color:var(--t2)">'+p.origen+'</td>';
    h += '<td class="mono" style="text-align:right">'+p.fabricacion+'d</td>';
    h += '<td class="mono" style="text-align:right">'+p.transito+'d</td>';
    h += '<td class="mono" style="text-align:right">'+p.despacho+'d</td>';
    h += '<td class="mono" style="text-align:right;font-weight:700;color:'+stColor+'">'+p.lt_total+'d</td>';
    h += '<td class="mono">'+p.objetivo+'d</td>';
    h += '<td class="mono" style="color:'+stColor+'">'+p.desvio+'d</td>';
    h += '<td>'+stTag+'</td>';
    h += '<td><div class="bar-lt" style="width:'+maxBar+'px"><div class="bar-fab" style="width:'+fabW+'px" title="Fab: '+p.fabricacion+'d"></div><div class="bar-trans" style="width:'+transW+'px" title="Trans: '+p.transito+'d"></div><div class="bar-desp" style="width:'+despW+'px" title="Desp: '+p.despacho+'d"></div></div></td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  h += '<div style="margin-top:8px;display:flex;gap:16px;font-size:10px;color:var(--t2)"><span><span style="display:inline-block;width:10px;height:10px;background:var(--ac);border-radius:2px;opacity:.8"></span> Fabricacion</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--gn);border-radius:2px;opacity:.8"></span> Transito</span><span><span style="display:inline-block;width:10px;height:10px;background:var(--or);border-radius:2px;opacity:.8"></span> Despacho</span></div>';
  h += '</div>';
  
  // By provider summary
  h += '<div class="card"><h3>Promedio por Proveedor</h3><table><thead><tr><th>Proveedor</th><th>Origen</th><th># Emb</th><th style="text-align:right">LT Prom</th><th style="text-align:right">Fab Prom</th><th style="text-align:right">Trans Prom</th><th style="text-align:right">Desp Prom</th><th>On-Time %</th><th>Cuello Botella</th></tr></thead><tbody>';
  var byProv = {};
  for(var i=0;i<perf.length;i++){
    var p = perf[i];
    if(!byProv[p.proveedor]) byProv[p.proveedor] = {origen:p.origen,n:0,lt:0,fab:0,trans:0,desp:0,ot:0};
    byProv[p.proveedor].n++;
    byProv[p.proveedor].lt+=p.lt_total;
    byProv[p.proveedor].fab+=p.fabricacion;
    byProv[p.proveedor].trans+=p.transito;
    byProv[p.proveedor].desp+=p.despacho;
    if(p.desvio<=0) byProv[p.proveedor].ot++;
  }
  var provs = Object.keys(byProv);
  for(var i=0;i<provs.length;i++){
    var k=provs[i];var d=byProv[k];
    var avgLt=Math.round(d.lt/d.n);var avgFab=Math.round(d.fab/d.n);var avgTr=Math.round(d.trans/d.n);var avgDe=Math.round(d.desp/d.n);
    var otPct=Math.round(d.ot/d.n*100);
    var bottleneck = avgFab>=avgTr && avgFab>=avgDe ? "Fabricacion" : (avgTr>=avgDe ? "Transito" : "Despacho");
    var ltColor = avgLt<=70?"var(--gn)":"var(--rd)";
    h += '<tr><td style="font-weight:600">'+k+'</td><td style="color:var(--t2)">'+d.origen+'</td><td class="mono">'+d.n+'</td><td class="mono" style="text-align:right;color:'+ltColor+'">'+avgLt+'d</td><td class="mono" style="text-align:right">'+avgFab+'d</td><td class="mono" style="text-align:right">'+avgTr+'d</td><td class="mono" style="text-align:right">'+avgDe+'d</td><td class="mono" style="color:'+(otPct>=70?'var(--gn)':'var(--or)')+'">'+otPct+'%</td><td style="font-size:11px;color:var(--or)">'+bottleneck+'</td></tr>';
  }
  h += '</tbody></table></div>';
  
  document.getElementById("content").innerHTML = h;
}

function renderHistorial(){
  var all = D.embarques_2025.concat(D.embarques_2026);
  var h = '<div class="card"><h3>Historial Completo de Embarques 2025-2026</h3>';
  h += '<table><thead><tr><th>O.C.</th><th>Proveedor</th><th>Productos</th><th style="text-align:right">Cant. Req.</th><th style="text-align:right">Cant. Emb.</th><th>ETD</th><th>ETA</th><th style="text-align:right">Monto USD</th><th>Term</th><th>Factura</th><th>Vto.</th></tr></thead><tbody>';
  
  for(var i=0;i<all.length;i++){
    var e = all[i];
    var prods = [];
    var totalReq=0, totalEmb=0, totalMonto=0;
    for(var j=0;j<e.productos.length;j++){
      prods.push(e.productos[j].producto);
      totalReq += e.productos[j].cant_req;
      totalEmb += e.productos[j].cant_emb;
      totalMonto += e.productos[j].monto;
    }
    h += '<tr><td class="mono" style="font-weight:600">'+e.oc+'</td><td>'+e.emisor+'</td><td style="font-size:10px;max-width:150px;overflow:hidden;text-overflow:ellipsis">'+prods.join(", ")+'</td><td class="mono" style="text-align:right">'+fmt(totalReq)+'</td><td class="mono" style="text-align:right">'+fmt(totalEmb)+'</td><td class="mono">'+e.etd.substring(0,10)+'</td><td class="mono">'+e.eta.substring(0,10)+'</td><td class="mono" style="text-align:right">'+fmt(totalMonto)+'</td><td class="mono">'+e.term+'</td><td class="mono" style="font-size:10px">'+e.num_fact+'</td><td class="mono" style="font-size:10px">'+e.due.substring(0,10)+'</td></tr>';
  }
  h += '</tbody></table></div>';
  document.getElementById("content").innerHTML = h;
}

// INIT
renderTabs();
renderContent();
</script>
